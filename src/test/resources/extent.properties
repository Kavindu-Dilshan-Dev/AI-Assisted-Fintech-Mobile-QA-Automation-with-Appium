# ============================================================
#  extent.properties
#  Configures the grasshopper extentreports-cucumber7 adapter.
#  This is the SINGLE Extent engine for the framework.
#  Do NOT create a second ExtentReports instance in code.
# ============================================================

# ---------- Reporters: enable Spark (HTML) only ----------
extent.reporter.spark.start=true
extent.reporter.spark.out=target/extent-report/Spark.html
# Inline base64 screenshots are disabled so we control the on-disk
# screenshot location (and our masking/sensitive-skip policy) explicitly.
extent.reporter.spark.base64imagesrc=false

# Disable other reporters (single-engine policy).
extent.reporter.html.start=false
extent.reporter.pdf.start=false
extent.reporter.logger.start=false
extent.reporter.klov.start=false

# ---------- Screenshot handling ----------
# Directory where the adapter looks for / writes screenshot files.
screenshot.dir=target/screenshots/
# Path stored in the report, relative to the report file (target/extent-report).
# ../screenshots resolves back to target/screenshots from the Spark.html location.
screenshot.rel.path=../screenshots/
# Attach screenshots only on failure by default; passing steps attach
# explicitly via ExtentReportManager.attachScreenshot when needed.
screenshot.events=Failed

# ---------- Report metadata / document section ----------
extent.reporter.spark.config=src/test/resources/extent-spark-config.xml
systeminfo.Project=fintech-mobile-qa
systeminfo.Component=Synthetic Fintech Wallet
systeminfo.Engine=Appium + Cucumber + JUnit Platform
systeminfo.Java=17
systeminfo.Compliance=No-real-PII | Masked-PAN/CVV/OTP | Secrets-from-env

# ---------- Document / vieworder ----------
extent.reporter.spark.vieworder=dashboard,test,exception,author,device,log
