# ============================================================
#  config.properties  -  NON-SECRET DEFAULTS ONLY
# ------------------------------------------------------------
#  Resolution order (later wins), enforced by ConfigManager:
#    1. this file
#    2. JVM system properties   (-Dkey=value)
#    3. environment variables   (KEY -> UPPER_SNAKE_CASE)
#
#  *** NEVER put secrets here. ***
#  Passwords, OTP API tokens, and device-farm keys are read ONLY
#  from environment variables:
#     TEST_USER_PASSWORD, OTP_API_TOKEN, DEVICE_FARM_TOKEN, ...
# ============================================================

# ---------- Target platform ----------
# android | ios   (override at runtime with -Dplatform=ios)
platform=android

# ---------- Appium server ----------
appium.server.url=http://127.0.0.1:4723

# ---------- Waits (seconds) ----------
explicit.wait.seconds=20
implicit.wait.seconds=10

# ---------- OTP provider ----------
# static  -> StaticOtpProvider (returns otp.static; local/dev only)
# testapi -> TestApiOtpProvider (HTTP GET otp.api.url; token from env OTP_API_TOKEN)
otp.provider=static
otp.static=000000
# Test mailbox/backend endpoint (non-secret URL). Token comes from env, never here.
otp.api.url=

# ---------- App under test (synthetic placeholders) ----------
# Replace with your own synthetic wallet build identifiers.
# Android
app.package=com.fintech.wallet.sample
app.activity=com.fintech.wallet.sample.MainActivity
# iOS
app.bundleId=com.fintech.wallet.sample
# Optional absolute path / URL to the app artifact (leave blank to use installed app).
app.path=

# ---------- Device capabilities (non-secret) ----------
# Android
android.deviceName=Android Emulator
android.platformVersion=14
android.automationName=UiAutomator2

# iOS
ios.deviceName=iPhone 15
ios.platformVersion=17.5
ios.automationName=XCUITest

# ---------- Session behaviour ----------
appium.newCommandTimeout=120
appium.autoGrantPermissions=true
